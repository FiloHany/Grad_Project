version: "3.9"

services:
  cardiovision:
    build: .
    image: cardiovision:latest
    container_name: cardiovision
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Uncomment volumes below to persist job outputs across restarts:
    # volumes:
    #   - ./jobs:/app/jobs
    #   - ./uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
